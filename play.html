<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solve the Secret Jigsaw!</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/konva@9.3.6/konva.min.js"></script>
    <style>
        /* Stack layout rules to keep the text hidden behind the canvas grid */
        .stage-wrapper {
            position: relative;
            width: 600px;
            height: 450px;
            margin: 0 auto;
            background-color: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #334155;
        }

        #secret-message-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            color: #38bdf8;
            font-size: 32px;
            font-family: sans-serif;
            font-weight: bold;
            text-align: center;
            z-index: 1; /* Sits at the bottom layer */
            word-break: break-word;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* Sits directly on top of the text */
            transition: opacity 1.5s ease-in-out; /* Handles the clean cinematic fade out */
            opacity: 1;
        }

        /* Class applied via JS when the game is won */
        .fade-out-canvas {
            opacity: 0 !important;
            pointer-events: none; /* Stops interaction once faded */
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="ad-slot sidebar-ad" id="ad-left-player">
            <p>Ad Space</p>
        </div>

        <main class="main-content">
            <header>
                <h1>🧩 Solve the Puzzle to Reveal the Surprise!</h1>
            </header>

            <section class="game-wrapper">
                <div class="stage-wrapper">
                    <div id="secret-message-display"></div>
                    <div id="canvas-container"></div>
                </div>
                
                <div class="control-row">
                    <button id="reset-btn" class="secondary-btn" onclick="window.location.reload();">🔄 Restart</button>
                    <a href="index.html" class="nav-btn">✨ Create Your Own Surprise</a>
                </div>
            </section>
        </main>

        <div class="ad-slot sidebar-ad" id="ad-right-player">
            <p>Ad Space</p>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
